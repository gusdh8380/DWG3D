# ──────────────────────────────────────────────────────────────────────────────
# DWG3D — Local Development Stack
# Services: api · worker · db · redis · minio · n8n · flower
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── FastAPI 메인 API 서버 ────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
    command: ["sh", "/app/entrypoint.sh"]
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /tmp/dwg3d:/tmp/dwg3d
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - dwg3d
    restart: unless-stopped

  # ── Celery 변환 워커 ─────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
    command: celery -A workers.celery_app worker --loglevel=info -Q conversion,default -c 2
    volumes:
      - ./backend:/app
      - /tmp/dwg3d:/tmp/dwg3d
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - dwg3d
    restart: unless-stopped

  # ── PostgreSQL 15 ────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: dwg3d
      POSTGRES_USER: dwg3d
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dwg3d -d dwg3d"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - dwg3d
    restart: unless-stopped

  # ── Redis 7 (Celery Broker + Cache) ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - dwg3d
    restart: unless-stopped

  # ── MinIO (S3 호환 로컬 스토리지) ───────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dwg3d
    restart: unless-stopped

  # ── n8n 오케스트레이션 ──────────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin123
      - GENERIC_TIMEZONE=Asia/Seoul
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - dwg3d
    restart: unless-stopped

  # ── Celery Flower (태스크 모니터링 UI) ──────────────────────────────────────
  flower:
    image: mher/flower:2.0
    command: celery --broker=redis://redis:6379/0 flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - dwg3d
    restart: unless-stopped

# ── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  minio_data:
  n8n_data:

# ── Network ──────────────────────────────────────────────────────────────────
networks:
  dwg3d:
    driver: bridge
